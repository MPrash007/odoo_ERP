databases:
  - name: shiv-erp-db
    databaseName: shiv_erp
    user: shiv_erp_user
    plan: free

services:
  - type: web
    name: shiv-erp-web
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shiv-erp-db
          property: connectionString
      - key: NODE_ENV
        value: production
